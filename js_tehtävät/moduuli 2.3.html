<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tehtävä 3</title>
</head>
<body>
<h2>Koirien nimet oikeassa järjestyksessä</h2>
<ul id="lista"></ul>

<script>
    let Koirat = [];
    for (let i = 0; i<6; i++) {
        let nimi = prompt("anna koiran nimi " + (i + 1) + ":");
        Koirat.push(nimi);
    }
    Koirat.sort();
    Koirat.reverse();

    let ul = document.getElementById("lista");

    for (let i=0; i < Koirat.length; i++) {
        let li = document.createElement("li");
        li.textContent = Koirat[i];
        ul.appendChild(li);
    }
</script>









</body>
</html>
