<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tehtävä 2</title>

</head>
<body>
<h2>Osallistujat aakkosjärjestyksessä</h2>
<ol id="lista"></ol>

<script>

    let maara = Number(prompt("Kuinka monta osallistujaa?"));
    let osallistujat = [];

    for (let i=0; i<maara; i++) {
        let nimi = prompt("Anna osallistuja nimi " + (i+1) + ":");
        osallistujat.push(nimi);
    }

    osallistujat.sort();

    let ol = document.getElementById("lista");
    for ( let i = 0; i< osallistujat.length; i++) {
        let li = document.createElement("li");
        li.textContent = osallistujat[i];
        ol.appendChild(li);
    }
</script>
</body>
</html>
